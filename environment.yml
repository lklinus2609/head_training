name: d4head
channels:
  - pytorch
  - nvidia/label/cuda-11.8.0
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch=2.1.*
  - torchaudio
  - torchvision
  - pytorch-cuda=11.8
  - numpy
  - scipy
  - h5py
  - librosa
  - libsndfile
  - pysoundfile
  - pyyaml
  - tqdm
  - scikit-learn
  - matplotlib
  - pip
  - pip:
      - wandb
      - transformers
      - huggingface_hub
      - trimesh
      - pyrender
      - fastapi
      - uvicorn[standard]
