name: d4head
# Unified env for all NVIDIA GPU nodes we target:
#   - LS6 gpu-a100         (A100, SM 8.0)
#   - Stampede3 h100       (H100, SM 9.0)
#   - Stampede3 amd-rtx    (RTX Pro 6000 Blackwell, SM 12.0)
# Uses PyTorch cu128 wheels so a single env covers all three archs.
# Requires NVIDIA driver >=550 on the compute node (check `nvidia-smi`).
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy<2
  - scipy
  - h5py
  - librosa
  - libsndfile
  - pysoundfile
  - pyyaml
  - tqdm
  - scikit-learn
  - matplotlib
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch>=2.6
      - torchaudio>=2.6
      - torchvision
      - nvidia-cuda-nvrtc-cu12
      - wandb
      - transformers>=4.40
      - huggingface_hub
      - trimesh
      - pyrender
      - imageio>=2.31
      - imageio-ffmpeg>=0.4.9
      - fastapi
      - uvicorn[standard]
