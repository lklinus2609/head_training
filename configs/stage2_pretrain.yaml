_base_: base.yaml

# Canonical Stage 2 pretraining recipe. Consolidates prior variants:
#   - Original L1 + short-horizon variance matching.
#   - Velocity and acceleration L1 losses (added v2). Directly attack motion
#     damping and jitter, respectively. Fully batched, no sequential cost.
#   - bfloat16 autocast + torch.compile. Quality-neutral GPU-efficiency
#     toggles on A100. ~2-3x throughput vs fp32/eager.
#   - gen_horizon=10 frames @ 30 fps = 333 ms ≈ one full syllable with
#     coarticulation overlap. Previous H=4 (133 ms) was sub-syllabic:
#     English syllables span 150-250 ms and coarticulation effects (lip
#     rounding, jaw setup) span 400-600 ms, so causal self-attention on
#     expression tokens at H=4 never saw a within-window syllable and
#     couldn't learn expression-to-expression dynamics at syllable scale.
#     Trade-off: attention is O(H²), N windows per sample drops from 15 to
#     6, net training step cost ~2-2.5x. No inference-path change.
#   - Spectral + covariance losses (folded in from stage2_pretrain_spec).
#     L1 / velocity / accel / per-dim std matching attack symptoms
#     (smoothness, per-dim amplitude) but leave the L1-at-the-median
#     plateau at L1 ≈ 0.31 where the model sits on the conditional median
#     of the one-to-many audio → expression mapping and drops expressive
#     detail. Two losses attack what remains:
#       lambda_spec: L1 on |FFT(pred)| vs |FFT(target)| per-dim along
#         time. Time-domain L1 under-weights high-frequency motion (low
#         spectral mass). Matching magnitude spectra pressures
#         high-frequency expression content (lip closures, fast jaw
#         motion, blinks) back to data levels.
#       lambda_cov: L1 on per-sample cross-dim covariance. Diagonal
#         variance matching enforces per-dim amplitude but lets
#         off-diagonal correlations collapse. Covariance matching
#         enforces coordinated multi-dim motion (jaw / lip co-movement
#         during phonemes).
#     Both fully batched, no sequential cost, no inference-path change.
#     Weights are educated guesses; retune after the first curve. L1
#     stays dominant so the model can't "cheat" by generating
#     high-spectrum noise.
#
# The previous `stage2_pretrain_v2.yaml`, `stage2_pretrain_fixed.yaml`,
# `stage2_pretrain_h10.yaml`, and `stage2_pretrain_spec.yaml` variants were
# removed — their settings live here. Sequential self-drift and full-rollout
# variance matching are left configurable (default 0) in case they're needed
# later, but are off by default because they slow training by ~14x for a
# fraction of the problem FM showed was not AR-exposure-bias-dominant.
stage2:
  epochs: 500
  batch_size: 128
  lr: 1.0e-4
  beta1: 0.9
  beta2: 0.999
  weight_decay: 1.0e-5
  grad_clip: 1.0
  gen_horizon: 10
  val_every: 1
  save_every: 5
  patience: 10
  seed: 42
  # Short-horizon variance matching (kept from original).
  lambda_var: 0.05
  lambda_var_warmup_epochs: 40
  lambda_var_decay_epochs: 40
  # Direct temporal losses — primary damping/jitter mitigations.
  lambda_vel: 0.5
  lambda_accel: 0.25
  # Spectral + covariance losses — attack the L1-at-the-median plateau.
  lambda_spec: 0.25
  lambda_cov: 0.1
  # Sequential paths (off by default).
  p_drift_start: 0.0
  p_drift_end: 0.0
  p_drift_warmup_epochs: 0
  lambda_var_full: 0.0
  lambda_var_full_start: 0
  lambda_var_full_decay_epochs: 0
  # Reference-clip evaluation for best-checkpoint selection + A/B vs FM.
  ref_clip_audio_path: "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/2_scott_0_8_8.wav"
  use_cosine_lr: true
  cosine_lr_min_ratio: 0.1
  # GPU-efficiency (quality-neutral).
  use_bf16: true
  # torch.compile disabled: PyTorch 2.1's dynamo can't handle
  # nn.MultiheadAttention's internal sizes() calls when multiple input shapes
  # are encountered (e.g. the last ref-inference chunk has max_len=1 vs
  # training's max_len=H=4). bf16 + TF32 recover most of the speedup anyway.
  use_compile: false
