_base_: stage2_pretrain_noise.yaml

# Track B: short finetune of Track A best with scheduled sampling on
# prev_frames. Reactivates the existing p_drift mechanism in
# _short_horizon_forward (already implemented but disabled in canonical
# because a prior FM ablation suggested AR drift was not dominant — that
# assumption was contradicted by a sliding-vs-teacher test on the AR
# transformer track, where sliding L1 = 2.10 vs teacher L1 = 0.27).
#
# Sequential path is ~14x slower per step, so this is a short finetune
# (80 epochs) rather than a from-scratch retrain. Expected total cost:
# ~1.4x of Track A's full train. Run only if Track A's sliding-vs-teacher
# gap remains > ~2x.
#
# pretrained_gen_path must point to Track A's stage2_best.pt. Either
# replace below or pass via --pretrained_gen on the command line.
stage2:
  epochs: 120                      # 80 was sized for scheduled-sampling alone;
                                   # bumped to 120 because Track B now also
                                   # learns emo=1 representations from the
                                   # additional split being folded into train.
  lr: 5.0e-5                       # lower LR for finetune
  use_cosine_lr: false             # advance-loop in train_stage2.py assumes resume semantics
  patience: 0                      # don't early-stop a short finetune
  pretrained_gen_path: ""          # set to $WORK/checkpoints/d4head/<track_a_run>/stage2_best.pt
  # Scheduled sampling schedule
  p_drift_start: 0.0
  p_drift_end: 0.3
  p_drift_warmup_epochs: 20
  # Continuous regularizer alongside discrete drift
  prev_frames_noise_std: 0.05
  # Keep dormant — would stack 14x cost on top of 14x sequential path
  lambda_var_full: 0.0
  # Multi-clip selection set: 8 neutral (test split, emo=0) + 8 happy
  # (additional split, emo=1). The English BEAT2 v2.0.0 subset only has
  # these two emotions on disk (1472 emo=0, 156 emo=1) so this exhausts
  # available emotion diversity. 5 speakers (lawrence, nidal, scott,
  # solomon, sophie) appear in both emotion groups for cross-emotion
  # comparison; 6 are emotion-unique (kieks, stewart, wayne neutral;
  # ayana, carla, miranda happy). Selection metric is mean
  # ref_raw_l1_lag across all 16; per-clip metrics still logged.
  # 2_scott_1_8_8.wav is intentionally NOT in the set so it remains
  # a clean held-out test number.
  ref_clip_audio_paths:
    - "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/10_kieks_0_6_6.wav"
    - "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/4_lawrence_0_111_111.wav"
    - "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/11_nidal_0_1_1.wav"
    - "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/2_scott_0_65_65.wav"
    - "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/3_solomon_0_103_103.wav"
    - "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/7_sophie_0_3_3.wav"
    - "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/5_stewart_0_7_7.wav"
    - "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/1_wayne_0_5_5.wav"
    - "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/21_ayana_1_12_12.wav"
    - "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/6_carla_1_10_10.wav"
    - "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/4_lawrence_1_11_11.wav"
    - "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/9_miranda_1_10_10.wav"
    - "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/11_nidal_1_6_6.wav"
    - "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/2_scott_1_9_9.wav"
    - "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/3_solomon_1_4_4.wav"
    - "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/7_sophie_1_5_5.wav"
