_base_: base.yaml

# Parallel experimental track: longer short-horizon window.
#
# Canonical recipe trains with gen_horizon=4 frames @ 30 fps = 133 ms. That's
# sub-syllabic: average English syllable is 150-250 ms, coarticulation
# effects (lip rounding, jaw setup) span 400-600 ms. The causal self-attention
# on expression tokens during training therefore never sees a full
# within-window syllable, so it cannot learn expression-to-expression
# dynamics at syllable scale from gradient signal. Audio cross-attention is
# unaffected (context_past + H + context_future = 19 frames ≈ 633 ms is
# already cross-syllabic), but the expression self-attention is the missing
# piece for long-range temporal coherence.
#
# H=10 frames @ 30 fps = 333 ms ≈ one full syllable with coarticulation
# overlap. Trade-offs vs H=4:
#   - Attention is O(H²): ~6.25x per-window attention cost.
#   - N = seq_len / H = 60/10 = 6 windows per sample (vs 15 at H=4),
#     so fewer gradient-contributing windows per batch.
#   - Net training step cost ~2-2.5x.
#   - No inference-path change (KV-cache inference already handles T=60).
#
# Paired with or compared against the spectral/covariance track
# (stage2_pretrain_spec.yaml). Run the head-to-head on the ref clip.
stage2:
  epochs: 500
  batch_size: 128
  lr: 1.0e-4
  beta1: 0.9
  beta2: 0.999
  weight_decay: 1.0e-5
  grad_clip: 1.0
  # Longer short-horizon window. Key change vs canonical recipe.
  gen_horizon: 10
  val_every: 1
  save_every: 5
  patience: 10
  seed: 42
  lambda_var: 0.05
  lambda_var_warmup_epochs: 40
  lambda_var_decay_epochs: 40
  lambda_vel: 0.5
  lambda_accel: 0.25
  # Spectral/covariance off here so this is a clean horizon-only ablation.
  # Combine with spec/cov in a later config if horizon alone shows lift.
  lambda_spec: 0.0
  lambda_cov: 0.0
  p_drift_start: 0.0
  p_drift_end: 0.0
  p_drift_warmup_epochs: 0
  lambda_var_full: 0.0
  lambda_var_full_start: 0
  lambda_var_full_decay_epochs: 0
  ref_clip_audio_path: "$WORK/data/beat2_raw/beat_english_v2.0.0/wave16k/2_scott_0_8_8.wav"
  use_cosine_lr: true
  cosine_lr_min_ratio: 0.1
  use_bf16: true
  use_compile: false
